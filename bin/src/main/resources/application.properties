spring.application.name=exam-backend-integration
server.port=8080

# MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/secure_exam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=shubham
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT config (use a long random secret in production)
app.jwt.secret=ReplaceWithAtLeast256BitLongSecretKeyForJwtSigning1234567890
app.jwt.expiration-ms=86400000

# CORS and websocket
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.websocket.allowed-origins=http://localhost:3000,http://localhost:5173

logging.level.org.springframework.security=INFO
